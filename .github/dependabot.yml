version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
      timezone: America/Chicago
    labels: ["dependencies", "github-actions"]
    open-pull-requests-limit: 5

  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
      timezone: America/Chicago
    labels: ["dependencies", "python"]
    open-pull-requests-limit: 5
    groups:
      mkdocs:
        patterns:
          - mkdocs*
