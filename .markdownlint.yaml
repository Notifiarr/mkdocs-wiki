# markdownlint config — see https://github.com/DavidAnson/markdownlint/blob/main/doc/Rules.md
default: true

# MkDocs Material uses content tabs + admonitions that look like HTML to
# markdownlint. Trust the strict mkdocs build to catch true breakage.
MD033: false  # inline HTML allowed (mermaid blocks, admonition raw HTML)

# Heading siblings on the same level often differ in case (proper nouns).
MD024:
  siblings_only: true

# MkDocs Material rewrites bare links; allow them.
MD034: false  # bare URLs

# Material themes encourage 4-space indent under nested list items.
MD007:
  indent: 4

# Line length: don't enforce — wiki paragraphs are long-form prose.
MD013: false

# Allow trailing punctuation in headings.
MD026: false

# Fenced code blocks nested inside admonitions / list items are indented 4
# spaces, which markdownlint misreads as indented code blocks — conflicting
# with the fenced style used elsewhere. Fenced blocks carry the language label
# MkDocs Material needs for highlighting, so keep them fenced and disable the
# style check rather than degrade the rendered docs.
MD046: false  # code-block-style (fenced vs indented)

# The homepage (docs/index.md) intentionally leads with small badge-section
# labels before the main H1, so the first heading is not top-level.
MD041: false  # first-line-h1
